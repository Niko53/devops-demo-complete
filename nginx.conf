server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    add_header Content-Type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /ready {
    add_header Content-Type application/json;
    return 200 '{"ready":true}';
  }

  location = /version {
    add_header Content-Type application/json;
    return 200 '{"version":"1.4.2","channel":"stable","commit":"demo-sha"}';
  }
}
